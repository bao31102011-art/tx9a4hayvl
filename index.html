<!doctype html>
<html lang="en-us">
<head>
    <meta charset="utf-8">
    <meta content="text/html; charset=utf-8" http-equiv="Content-Type">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>GAME TÀI XỈU MOBILE</title>
    <style>
        /* Xóa toàn bộ khoảng trắng rìa màn hình */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            overflow: hidden; /* Chống cuộn trang lung tung */
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Ép khung Canvas tự co giãn full thiết bị nhưng giữ nguyên tỷ lệ dọc */
        canvas.emscripten {
            border: 0 none;
            background-color: #000;
            width: 100vw;
            height: 100vh;
            object-fit: contain; /* Giữ nguyên tỷ lệ 450x800 không lo vỡ hình */
            display: block;
        }

        /* Ẩn hoàn toàn các thành phần giao diện thừa của Emscripten */
        #emscripten_logo, #controls, #output, .spinner, #status, progress {
            display: none !important;
        }
        
        .emscripten_border {
            border: none !important;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }
    </style>
</head>
<body>
    <!-- Khung chứa Canvas game sạch sẽ -->
    <div class="emscripten_border">
        <canvas class="emscripten" id="canvas" oncontextmenu="event.preventDefault()" tabindex="-1"></canvas>
    </div>

    <script>
        var canvasElement = document.getElementById("canvas");
        
        // Khởi tạo Module cho Emscripten nhận diện Canvas
        var Module = {
            canvas: canvasElement,
            setStatus: function(text) { console.log(text); },
            monitorRunDependencies: function(left) {}
        };
    </script>
    
    <!-- Gọi file logic game của bạn -->
    <script async src="index.js"></script>
</body>
</html>
