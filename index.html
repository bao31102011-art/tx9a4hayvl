<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>My Game</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #000;
  }
  #canvas {
    display: block;
    width: 100vw;
    height: 100vh;
    outline: none;
    background-color: #000;
  }
  /* Màn hình chờ trong lúc game đang tải */
  #loading-screen {
    position: fixed;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: #000;
    color: #ccc;
    font-family: Arial, sans-serif;
    z-index: 10;
  }
  #loading-screen.hidden {
    display: none;
  }
  .spinner {
    width: 40px;
    height: 40px;
    border: 4px solid #333;
    border-top: 4px solid #bdd72e;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin-bottom: 16px;
  }
  @keyframes spin {
    to { transform: rotate(360deg); }
  }
  #progress {
    width: 260px;
    height: 6px;
  }
  #status {
    margin-top: 12px;
    font-size: 14px;
  }
  /* Gợi ý bấm để vào chế độ toàn màn hình thật */
  #tap-hint {
    position: fixed;
    bottom: 16px;
    left: 50%;
    transform: translateX(-50%);
    color: rgba(255,255,255,0.6);
    font-family: Arial, sans-serif;
    font-size: 13px;
    z-index: 5;
    pointer-events: none;
    transition: opacity 0.4s;
  }
</style>
</head>
<body>

<canvas id="canvas" oncontextmenu="event.preventDefault()" tabindex="-1"></canvas>

<div id="loading-screen">
  <div class="spinner"></div>
  <progress id="progress" hidden max="100" value="0"></progress>
  <div id="status">Đang tải...</div>
</div>

<div id="tap-hint">Bấm vào màn hình để chơi toàn màn hình</div>

<script>
  var canvasElement = document.getElementById('canvas');
  var loadingScreen = document.getElementById('loading-screen');
  var statusElement = document.getElementById('status');
  var progressElement = document.getElementById('progress');
  var tapHint = document.getElementById('tap-hint');

  canvasElement.addEventListener('webglcontextlost', function (e) {
    alert('WebGL context lost. Cần tải lại trang.');
    e.preventDefault();
  }, false);

  var setStatus = function (text) {
    if (!setStatus.last) setStatus.last = { time: Date.now(), text: '' };
    if (text === setStatus.last.text) return;
    var m = text.match(/([^(]+)\((\d+(\.\d+)?)\/(\d+)\)/);
    var now = Date.now();
    if (m && now - setStatus.last.time < 30) return;
    setStatus.last.time = now;
    setStatus.last.text = text;
    if (m) {
      progressElement.value = parseInt(m[2]) * 100;
      progressElement.max = parseInt(m[4]) * 100;
      progressElement.hidden = false;
    } else {
      progressElement.value = null;
      progressElement.max = null;
      progressElement.hidden = true;
      if (!text) {
        // Tải xong -> ẩn màn hình chờ
        loadingScreen.classList.add('hidden');
      }
    }
    statusElement.innerHTML = text;
  };

  var Module = {
    print: function (...args) { console.log(...args); },
    canvas: canvasElement,
    setStatus: setStatus,
    totalDependencies: 0,
    monitorRunDependencies: function (left) {
      this.totalDependencies = Math.max(this.totalDependencies, left);
      setStatus(left
        ? 'Đang chuẩn bị... (' + (this.totalDependencies - left) + '/' + this.totalDependencies + ')'
        : 'Đã tải xong.');
    }
  };

  setStatus('Đang tải...');

  window.onerror = window.onunhandledrejection = function () {
    setStatus('Đã xảy ra lỗi, xem console.');
  };

  // ---- Toàn màn hình thật khi người chơi bấm/chạm lần đầu ----
  function goFullscreen() {
    var el = document.documentElement;
    var req = el.requestFullscreen || el.webkitRequestFullscreen || el.mozRequestFullScreen || el.msRequestFullscreen;
    if (req) {
      req.call(el).catch(function () {});
    }
    if (tapHint) {
      tapHint.style.opacity = '0';
      setTimeout(function () { tapHint.style.display = 'none'; }, 400);
    }
    document.removeEventListener('click', goFullscreen);
    document.removeEventListener('touchstart', goFullscreen);
  }
  document.addEventListener('click', goFullscreen);
  document.addEventListener('touchstart', goFullscreen);
</script>
<script async src="index.js"></script>
</body>
</html>
